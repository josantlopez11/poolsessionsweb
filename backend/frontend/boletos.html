<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmación | POOL SESSIONS</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background: #0d0d0d;
    color: #f0f0f0;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    width: 100%;
    background: #111;
    padding: 20px 0;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  header img {
    height: 60px;
  }
  main {
    max-width: 800px;
    width: 90%;
    padding: 20px;
    margin-top: 30px;
    background: #1a1a1a;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.7);
  }
  h1 {
    text-align: center;
    color: #00ffea;
    margin-bottom: 10px;
  }
  p {
    text-align: center;
    margin-bottom: 30px;
  }
  .ticket {
    background: #222;
    border: 2px solid #00ffea;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.2s;
  }
  .ticket:hover {
    transform: scale(1.03);
    box-shadow: 0 0 20px #00ffea;
  }
  .ticket h2 {
    margin: 10px 0 5px 0;
    color: #fff;
  }
  .ticket h3 {
    margin: 5px 0;
    color: #00ffea;
  }
  .ticket img.qr {
    margin-top: 15px;
    width: 180px;
    height: 180px;
  }
  .info {
    text-align: center;
    margin-top: 15px;
  }
  a.button {
    display: inline-block;
    margin-top: 25px;
    padding: 12px 25px;
    background: #00ffea;
    color: #000;
    text-decoration: none;
    font-weight: bold;
    border-radius: 8px;
    transition: 0.2s;
  }
  a.button:hover {
    background: #00d4bb;
  }
</style>
</head>
<body>
<header>
  <img src="assets/pool-logo.jpg" alt="POOL SESSIONS Logo">
</header>
<main>
  <h1>✅ Compra Confirmada</h1>
  <p>Recibirás tus boletos por correo. Aquí puedes verlos también:</p>
  <div id="tickets"></div>
  <a href="index.html" class="button">Volver al inicio</a>
</main>

<script>
async function fetchTickets(){
  const params = new URLSearchParams(window.location.search);
  const order_id = params.get("order");
  if(!order_id) return;

  try{
    const res = await fetch(`${window.location.origin}/success?order=${order_id}`);
    const data = await res.json();
    const container = document.getElementById("tickets");

    data.tickets.forEach(t=>{
      const div = document.createElement("div");
      div.classList.add("ticket");
      div.innerHTML = `
        <h2>${t.ticket_code}</h2>
        <h3>${t.event_name || "POOL SESSIONS"}</h3>
        <div class="info">
          <p>📅 ${t.event_date || "Fecha"} &nbsp; | &nbsp; 📍 ${t.venue || "Lugar"}</p>
          <p>🎫 Cantidad: ${t.quantity || 1}</p>
          <p>✉️ ${t.buyer_email}</p>
        </div>
        <img class="qr" src="${t.qr}" alt="QR del ticket">
      `;
      container.appendChild(div);
    });
  } catch(err){
    console.error(err);
    document.getElementById("tickets").innerHTML = "<p>Error cargando boletos, intenta recargar</p>";
  }
}

fetchTickets();
</script>
</body>
</html>
