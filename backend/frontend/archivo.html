<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHIVO - POOL SESSIONS</title>

<style>

@font-face {
  font-family: 'Agrandir';
  src: url('fonts/Agrandir-Regular.otf') format('opentype');
  font-weight: 400;
}

@font-face {
  font-family: 'Agrandir';
  src: url('fonts/Agrandir-TextBold.otf') format('opentype');
  font-weight: 700;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Agrandir';
}

body{
  background:white;
  color:#134e4a;
}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
  font-weight:700;
  letter-spacing:2px;
  font-size:18px;
}

/* CONTENEDOR */
.container{
  display:flex;
  gap:10px;
  height:80vh;
  padding:0 10px;
  overflow:hidden;
}

/* COLUMNAS */
.column{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:12px;

  height:80vh;
  overflow-y:auto;

  scroll-snap-type: y proximity;
  scrollbar-width: none;
}

.column::-webkit-scrollbar{
  display:none;
}

/* FOTO */
.photo{
  width:100%;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;

  scroll-snap-align: center;
  flex:0 0 auto;
}

.photo img{
  width:100%;
  height:280px;
  object-fit:cover;
  display:block;
  border-radius:12px;
  transition: transform 0.35s ease;
}

.photo:hover img{
  transform: scale(1.02);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:1000;
}

.lightbox.active{
  display:flex;
}

.lightbox-img{
  width:90%;
  max-width:500px;
  border-radius:12px;
  object-fit:contain;
}

.lightbox-text{
  margin-top:15px;
  color:white;
  font-size:14px;
  text-align:center;
  max-width:80%;
}

/* BACK */
.back{
  display:block;
  text-align:center;
  margin:20px 0 40px;
  text-decoration:none;
  color:#134e4a;
  font-size:14px;
}

</style>
</head>

<body>

<div class="header">ARCHIVO</div>

<div class="container" id="gallery"></div>

<a href="index.html" class="back">VOLVER</a>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img class="lightbox-img" id="lightboxImg">
  <div class="lightbox-text" id="lightboxText"></div>
</div>

<script>

// 🔹 CONFIGURACIÓN
const sources = [
  { pool: "pool1", author: "areli", display: "Areli", prefix: "P01_", max: 50, event: "POOL SESSION #1 ALAMEDA" },
  { pool: "pool1", author: "kevin", display: "Kevin", prefix: "P01_", max: 50, event: "POOL SESSION #1 ALAMEDA" },
  { pool: "pool2", author: "mara", display: "Mara Barajas", prefix: "P02_", max: 50, event: "POOL SESSION #2 DUCK FIZZ" },
  { pool: "pool2", author: "bohemia", display: "@esabohemia", prefix: "P02_", max: 50, event: "POOL SESSION #2 DUCK FIZZ" }
];

// 🔹 LIGHTBOX refs
const lightbox = document.getElementById("lightbox");
const text = document.getElementById("lightboxText");
const lightboxImg = document.getElementById("lightboxImg");

// 🔹 contenedor
const container = document.getElementById("gallery");

// 🔹 crear 4 columnas
const columns = [];
for (let i = 0; i < 4; i++) {
  const col = document.createElement("div");
  col.classList.add("column");
  columns.push(col);
  container.appendChild(col);
}

// 🔹 recolectar imágenes
let allPhotos = [];

sources.forEach(src => {
  for (let i = 1; i <= src.max; i++) {
    const num = String(i).padStart(2, "0");

    const path = `./assets/fotos_pools/${src.pool}/${src.author}/${src.prefix}${num}.jpg`;

    allPhotos.push({
      img: path,
      text: `${src.event} - foto por ${src.display}`
    });
  }
});

// 🔥 mezclar (shuffle)
allPhotos.sort(() => Math.random() - 0.5);

// 🔹 renderizar
allPhotos.forEach((p, index) => {

  const img = new Image();

  img.onload = () => {

    const photo = document.createElement("div");
    photo.classList.add("photo");
    photo.dataset.text = p.text;
    photo.dataset.img = p.img;

    photo.appendChild(img);

    const colIndex = index % 4;
    columns[colIndex].appendChild(photo);

    // LIGHTBOX
    photo.addEventListener("click", () => {
      lightboxImg.src = p.img;
      text.innerText = p.text;
      lightbox.classList.add("active");
    });
  };

  img.src = p.img;
});

// cerrar lightbox
lightbox.addEventListener("click", () => {
  lightbox.classList.remove("active");
});

</script>

</body>
</html>
