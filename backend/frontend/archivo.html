<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHIVO - POOL SESSIONS</title>

<style>

@font-face {
  font-family: 'Agrandir';
  src: url('fonts/Agrandir-Regular.otf') format('opentype');
  font-weight: 400;
}

@font-face {
  font-family: 'Agrandir';
  src: url('fonts/Agrandir-TextBold.otf') format('opentype');
  font-weight: 700;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Agrandir';
}

body{
  background:white;
  color:#134e4a;
}

/* HEADER */
.header{
  text-align:center;
  padding:20px;
  font-weight:700;
  letter-spacing:2px;
  font-size:18px;
}

/* CONTENEDOR */
.container{
  display:flex;
  gap:10px;
  height:80vh;
  padding:0 10px;
  overflow:hidden;
}

/* COLUMNAS */
.column{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:12px;

  height:80vh;
  overflow-y:auto;

  scroll-snap-type: y mandatory;
  scrollbar-width: none;
}

.column::-webkit-scrollbar{
  display:none;
}

/* FOTO */
.photo{
  width:100%;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;

  scroll-snap-align: center;
  flex:0 0 auto;
}

.photo img{
  width:100%;
  height:auto;
  display:block;
  border-radius:12px;
  transition: transform 0.35s ease;
}

.photo:hover img{
  transform: scale(1.02);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:1000;
}

.lightbox.active{
  display:flex;
}

.lightbox-img{
  width:90%;
  max-width:500px;
  border-radius:12px;
  object-fit:contain;
}

.lightbox-text{
  margin-top:15px;
  color:white;
  font-size:14px;
  text-align:center;
  max-width:80%;
}

/* BACK */
.back{
  display:block;
  text-align:center;
  margin:20px 0 40px;
  text-decoration:none;
  color:#134e4a;
  font-size:14px;
}

</style>
</head>

<body>

<div class="header">ARCHIVO</div>

<div class="container">

  <!-- COLUMNA 1 -->
  <div class="column">

    <div class="photo" data-text="POOL SESSIONS #1 ALAMEDA - foto por ________" data-img="./assets/fotopool1.jpg">
      <img src="./assets/fotopool1.jpg">
    </div>

    <div class="photo" data-text="POOL SESSIONS #1 ALAMEDA - foto por ________" data-img="./assets/fotopool2.jpg">
      <img src="./assets/fotopool2.jpg">
    </div>

    <div class="photo" data-text="POOL SESSIONS #2 DUCKFIZZ - foto por Mara Barajas" data-img="./assets/fotopool3.jpg">
      <img src="./assets/fotopool3.jpg">
    </div>

    <div class="photo" data-text="POOL SESSIONS #1 ALAMEDA - foto por ________" data-img="./assets/fotopool4.jpg">
      <img src="./assets/fotopool4.jpg">
    </div>

    <div class="photo" data-text="POOL SESSIONS #2 DUCK FIZZ - foto por Mara Barajas" data-img="./assets/fotopool5.jpg">
      <img src="./assets/fotopool5.jpg">
    </div>

  </div>

  <!-- COLUMNA 2 -->
  <div class="column">

    <div class="photo" data-text="POOL SESSIONS #1 ALAMEDA - foto por ________" data-img="./assets/fotopool6.jpg">
      <img src="./assets/fotopool6.jpg">
    </div>

    <div class="photo" data-text="POOL SESSIONS #2 DUCK FIZZ - foto por Mara Barajas" data-img="./assets/fotopool7.jpg">
      <img src="./assets/fotopool7.jpg">
    </div>

    <div class="photo" data-text="POOL SESSIONS #2 DUCK FIZZ - foto por Mara Barajas" data-img="./assets/fotopool8.jpg">
      <img src="./assets/fotopool8.jpg">
    </div>

    <div class="photo" data-text="POOL SESSIONS #1 ALAMEDA - foto por ________" data-img="./assets/fotopool9.jpg">
      <img src="./assets/fotopool9.jpg">
    </div>

    <div class="photo" data-text="POOL SESSIONS #2 DUCK FIZZ - foto por Mara Barajas" data-img="./assets/fotopool10.jpg">
      <img src="./assets/fotopool10.jpg">
    </div>

  </div>

</div>

<a href="index.html" class="back">VOLVER</a>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img class="lightbox-img" id="lightboxImg">
  <div class="lightbox-text" id="lightboxText"></div>
</div>

<script>

const photos = document.querySelectorAll(".photo");
const lightbox = document.getElementById("lightbox");
const text = document.getElementById("lightboxText");
const lightboxImg = document.getElementById("lightboxImg");

photos.forEach(p => {
  p.addEventListener("click", () => {
    lightboxImg.src = p.getAttribute("data-img");
    text.innerText = p.getAttribute("data-text");
    lightbox.classList.add("active");
  });
});

lightbox.addEventListener("click", () => {
  lightbox.classList.remove("active");
});

</script>

</body>
</html>
