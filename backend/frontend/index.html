<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POOL SESSIONS</title>

<style>

@font-face {
  font-family: 'Agrandir';
  src: url('fonts/Agrandir-Regular.otf') format('opentype');
  font-weight: 400;
}

@font-face {
  font-family: 'Agrandir';
  src: url('fonts/Agrandir-TextBold.otf') format('opentype');
  font-weight: 700;
}

* {
  box-sizing: border-box;
  font-family: 'Agrandir';
}

body{
  margin:0;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

/* CONTENEDOR CENTRAL */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* LOGO */
.logo{
  max-width:555px;
  width:70%;
  margin-bottom:30px;
}

/* LINKS */
.links{
  display:flex;
  flex-direction:column;
  gap:16px;
  margin-bottom:50px;
}

/* BOLETOS */
.boletos{
  font-weight:800;
  font-size:25px;
  letter-spacing:2px;
  margin-bottom: 50px;
  text-decoration:none;
  color:#134e4a;
}

/* ARCHIVO (más pequeño y después) */
.archivo{
  font-weight:700;
  font-size:16px;
  letter-spacing:2px;
  text-decoration:none;
  color:#134e4a;
}

.manifiesto{
  font-weight:700;
  font-size:16px;
  letter-spacing:2px;
  text-decoration:none;
  color:#134e4a;
}

/* HOVER */
.boletos:hover,
.archivo:hover,
.manifiesto:hover{
  opacity:0.6;
}

/* SOCIAL */
.social{
  position:absolute;
  bottom:30px;
  display:flex;
  gap:22px;
  flex-wrap:wrap;
  justify-content:center;
  width:100%;
  padding:0 20px;
}

.social a{
  text-decoration:none;
  color:#134e4a;
  font-size:13px;
  letter-spacing:1px;
  font-family:'Agrandir';
}

.social a:hover{
  opacity:0.6;
}

/* MOBILE */
@media (max-width: 600px){
  .logo{
    width:85%;
  }

  .boletos{
    font-size:20px;
  }

  .archivo{
    font-size:14px;
  }
}

</style>
</head>

<body>

<div class="container">

  <img src="assets/logo-pools.png" class="logo">

  <div class="links">
    <a href="compra.html" class="boletos">BOLETOS</a>
    <a href="archivo.html" class="archivo">ARCHIVO</a>
    <a href="manifiesto.html" class="manifiesto" target="_blank" rel="noopener noreferrer">MANIFIESTO</a>
  </div>

</div>

<div class="social">

  <a href="https://www.instagram.com/poolsessions_" target="_blank">
    Instagram
  </a>

  <a href="https://www.tiktok.com/@poolsessions_" target="_blank">
    TikTok
  </a>

  <a href="https://www.youtube.com/@poolsessions-8" target="_blank">
    YouTube
  </a>

  <a href="contacto.html">
    Contacto
  </a>

</div>

</body>
</html>
