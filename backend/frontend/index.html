<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POOL SESSIONS</title>

<style>

@font-face {
  font-family: 'Agrandir';
  src: url('fonts/Agrandir-Regular.otf') format('opentype');
  font-weight: 400;
}

@font-face {
  font-family: 'Agrandir';
  src: url('fonts/Agrandir-TextBold.otf') format('opentype');
  font-weight: 700;
}

* {
  box-sizing: border-box;
  font-family: 'Agrandir';
}

body{
  margin:0;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;

  /* 🔥 FIX iOS */
  min-height: 100dvh;
}

/* CONTENEDOR CENTRAL */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* LOGO */
.logo{
  max-width:555px;
  width:70%;
  margin-bottom:15px;
  margin-top: 0; /* 🔥 FIX: elimina el negative margin */
}

/* LINKS */
.links{
  display:flex;
  flex-direction:column;
  gap:16px;
  margin-bottom:60px;
}

/* BOLETOS */
.boletos{
  margin-bottom: 50px;
  font-weight:800;
  font-size:25px;
  letter-spacing:2px;
  text-decoration:none;
  color:#134e4a;
}

/* ARCHIVO + MANIFIESTO */
.archivo,
.manifiesto{
  font-weight:700;
  font-size:16px;
  letter-spacing:2px;
  text-decoration:none;
  color:#134e4a;
}

/* HOVER SOLO DESKTOP */
@media (hover:hover){
  .boletos:hover,
  .archivo:hover,
  .manifiesto:hover,
  .social a:hover{
    opacity:0.6;
  }
}

/* SOCIAL */
.social{
  position: fixed; /* 🔥 mejor que absolute */
  bottom: 20px;
  left: 0;
  width: 100%;

  display:flex;
  gap:22px;
  flex-wrap:wrap;
  justify-content:center;

  padding:0 20px;
}

.social a{
  text-decoration:none;
  color:#134e4a;
  font-size:13px;
  letter-spacing:1px;
}

/* MOBILE */
@media (max-width: 600px){
  .logo{
    width:85%;
  }

  .boletos{
    font-size:20px;
  }

  .archivo,
  .manifiesto{
    font-size:14px;
  }

  .social{
    bottom: 15px;
    gap:16px;
    font-size:12px;
  }
}

</style>
</head>

<body>

<div class="container">

  <img src="assets/logo-pools.png" class="logo">

  <div class="links">
    <a href="compra.html" class="boletos">BOLETOS</a>
    <a href="archivo.html" class="archivo">ARCHIVO</a>
    <a href="manifiesto.html" class="manifiesto">MANIFIESTO</a>
  </div>

</div>

<div class="social">

  <a href="https://www.instagram.com/poolsessions_" target="_blank">
    Instagram
  </a>

  <a href="https://www.tiktok.com/@poolsessions_" target="_blank">
    TikTok
  </a>

  <a href="https://www.youtube.com/@poolsessions-8" target="_blank">
    YouTube
  </a>

  <a href="mailto:hola@poolsessions.mx">
    Contacto
  </a>

</div>

</body>
</html>
