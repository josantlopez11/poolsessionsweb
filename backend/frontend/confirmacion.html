<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Compra Confirmada</title>

<style>
body {
  margin: 0;
  background: #134e4a;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 40px;
  font-size: 28px;
}

/* CONTENEDOR */
.ticket-wrapper {
  position: relative;
  width: 360px;
  margin: 40px auto;
}

/* IMAGEN BASE */
.ticket-bg {
  width: 100%;
  border-radius: 20px;
}

/* QR */
.qr {
  position: absolute;
  bottom: 75px;
  left: 50%;
  transform: translateX(-50%);
  width: 240px;
  text-align: center;
}

/* CÓDIGO */
.code {
  position: absolute;
  bottom: 80px;
  width: 100%;
  text-align: center;
  font-size: 6px;
  color: black;
  letter-spacing: 1px;
}

/* LINK */
a {
  display: inline-block;
  margin-top: 20px;
  color: white;
}
</style>
</head>

<body>

<h1 id="title">Cargando...</h1>

<div id="tickets-container"></div>

<a href="/">Volver a inicio</a>

<script>
const urlParams = new URLSearchParams(window.location.search);
const orderId = urlParams.get("order");

const container = document.getElementById("tickets-container");
const title = document.getElementById("title");

if (!orderId) {
  container.innerHTML = "<p>Orden no encontrada.</p>";
} else {

  fetch(`/confirmacion-data?order=${orderId}`)
    .then(r => r.json())
    .then(data => {

      const buyerName = data.buyer_name || "INVITADO";
      title.innerText = `¡GRACIAS ${buyerName.toUpperCase()} POR TU COMPRA!`;

      if (!data.tickets || data.tickets.length === 0) {
        container.innerHTML = "<p>No hay tickets.</p>";
        return;
      }

      data.tickets.forEach(t => {

        const div = document.createElement("div");

        div.innerHTML = `
          <div class="ticket-wrapper">

            <img src="/assets/ticket-pool.png" class="ticket-bg"/>

            <img src="${t.qr}" class="qr"/>

            <div class="code">
              ${t.ticket_code || ""}
            </div>

          </div>
        `;

        container.appendChild(div);
      });

    })
    .catch(err => {
      console.error(err);
      container.innerHTML = "<p>Error cargando datos.</p>";
    });
}
</script>

</body>
</html>
