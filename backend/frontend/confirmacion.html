<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Compra Confirmada</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; text-align: center; }
    .ticket { border: 1px solid #ccc; padding: 1rem; margin: 1rem auto; width: 300px; }
    img { width: 200px; height: 200px; }
  </style>
</head>
<body>
  <h1>✅ Compra Exitosa</h1>
  <div id="tickets-container"></div>
  <a href="/">Volver a inicio</a>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get("order");

    if (!orderId) {
      document.getElementById("tickets-container").innerHTML = "<p>Orden no encontrada.</p>";
    } else {
      fetch(`/confirmacion-data?order=${orderId}`)
        .then(r => r.json())
        .then(data => {
          if (!data.tickets || data.tickets.length === 0) {
            document.getElementById("tickets-container").innerHTML = "<p>No hay tickets.</p>";
            return;
          }

          const container = document.getElementById("tickets-container");
          data.tickets.forEach(t => {
            const div = document.createElement("div");
            div.classList.add("ticket");
            div.innerHTML = `
              <h3>${t.event_name}</h3>
              <p>${t.event_description}</p>
              <p><strong>Comprador:</strong> ${t.buyer_name} (${t.buyer_email})</p>
              <p><strong>Fecha:</strong> ${t.event_date} ${t.event_time}</p>
              <p><strong>Lugar:</strong> ${t.venue}</p>
              <p><strong>Estado de pago:</strong> ${t.payment_status}</p>
              <img src="${t.qr}" alt="QR Ticket">
            `;
            container.appendChild(div);
          });
        });
    }
  </script>
</body>
</html>
