<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compra Confirmada</title>

<style>
body {
  margin: 0;
  background: #134e4a;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}

/* TITULO */
h1 {
  margin-top: 40px;
  font-size: 24px;
  padding: 0 16px;
}

/* CONTENEDOR */
#tickets-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  padding-bottom: 60px;
}

/* TICKET */
.ticket-wrapper {
  position: relative;
  width: 92%;
  max-width: 420px;
}

/* BACKGROUND */
.ticket-bg {
  width: 100%;
  border-radius: 20px;
  display: block;
}

/* QR (más grande + más abajo) */
.qr {
  position: absolute;
  bottom: 22%;
  left: 50%;
  transform: translateX(-50%);
  width: 65%;
  max-width: 260px;
}

/* CÓDIGO (pegado al QR) */
.code {
  position: absolute;
  bottom: 15%;
  width: 100%;
  text-align: center;
  font-size: 10px;
  color: black;
  letter-spacing: 1px;
}

/* LINK "volver al inicio" con Agrandir */
a {
  display: inline-block;
  margin-top: 20px;
  color: white;
  text-decoration: none;
  font-family: "Agrandir", Arial, sans-serif;
  font-size: 16px;
  opacity: 0.9;
}

a:hover {
  opacity: 1;
}

/* MOBILE */
@media (max-width: 480px) {

  h1 {
    font-size: 20px;
  }

  .ticket-wrapper {
    width: 95%;
  }

  .code {
    font-size: 9px;
  }
}
</style>
</head>

<body>

<h1 id="title">Cargando...</h1>

<div id="tickets-container"></div>

<a href="/">Volver al inicio</a>

<script>
const urlParams = new URLSearchParams(window.location.search);
const orderId = urlParams.get("order");

const container = document.getElementById("tickets-container");
const title = document.getElementById("title");

if (!orderId) {
  container.innerHTML = "<p>Orden no encontrada.</p>";
} else {

  fetch(`/confirmacion-data?order=${orderId}`)
    .then(r => r.json())
    .then(data => {

      const buyerName = data.buyer_name || "INVITADO";
      title.innerText = `¡GRACIAS ${buyerName.toUpperCase()} POR TU COMPRA!`;

      if (!data.tickets || data.tickets.length === 0) {
        container.innerHTML = "<p>No hay tickets.</p>";
        return;
      }

      data.tickets.forEach(t => {

        const div = document.createElement("div");

        div.innerHTML = `
          <div class="ticket-wrapper">

            <img src="/assets/ticket-pool.png" class="ticket-bg"/>

            <img src="${t.qr}" class="qr"/>

            <div class="code">
              ${t.ticket_code || ""}
            </div>

          </div>
        `;

        container.appendChild(div);
      });

    })
    .catch(err => {
      console.error(err);
      container.innerHTML = "<p>Error cargando datos.</p>";
    });
}
</script>

</body>
</html>
