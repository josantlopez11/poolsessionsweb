<script>

const urlParams = new URLSearchParams(window.location.search);
const orderId = urlParams.get("order");

const container = document.getElementById("tickets-container");
const title = document.getElementById("title");

function getFirstName(fullName) {
  if (!fullName) return "INVITADO";
  return fullName.trim().split(" ")[0];
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function fetchConfirmationWithRetry() {

  let attempts = 0;
  const maxAttempts = 20; // ~40 segundos máximo

  while (attempts < maxAttempts) {

    try {
      const res = await fetch(`https://api.poolsessions.mx/confirmacion-data?order=${orderId}`);
      const data = await res.json();

      // 🔥 si ya hay tickets → render
      if (data.tickets && data.tickets.length > 0) {
        return data;
      }

      // 🟡 aún no listo
      title.innerText = "Tus boletos se están generando... no cierres esta ventana";
      container.innerHTML = `
        <p style="opacity:0.8; text-align:center;">
          Estamos procesando tu compra<br/>
          Por favor espera un momento...
        </p>
      `;

    } catch (err) {
      console.error("retry error:", err);
    }

    await sleep(2000); // ⏱ cada 2 segundos
    attempts++;
  }

  throw new Error("Timeout esperando boletos");
}

if (!orderId) {
  container.innerHTML = "<p>Orden no encontrada.</p>";

} else {

  fetchConfirmationWithRetry()
    .then(data => {

      const buyerName = getFirstName(data.buyer_name);
      title.innerText = `¡GRACIAS ${buyerName.toUpperCase()} POR TU COMPRA!`;

      container.innerHTML = ""; // limpiar loading

      data.tickets.forEach((t, index) => {

        const ticketNumber = index + 1;

        const div = document.createElement("div");

        div.innerHTML = `
          <div class="ticket-wrapper">

            <img src="/assets/ticket-pool.png" class="ticket-bg"/>

            <img src="${t.qr}" class="qr"/>

            <div class="code">
              ${t.ticket_code || ""}
            </div>

            <div class="ticket-number">
              ${ticketNumber}
            </div>

          </div>
        `;

        container.appendChild(div);
      });

    })
    .catch(err => {
      console.error(err);
      title.innerText = "Estamos teniendo un retraso";
      container.innerHTML = `
        <p style="text-align:center; opacity:0.8;">
          Tus boletos aún se están generando.<br/>
          Por favor recarga en unos segundos.
        </p>
      `;
    });
}

</script>
