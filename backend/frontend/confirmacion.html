<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compra Confirmada</title>

<style>

@font-face {
  font-family: "Agrandir";
  src: url("/fonts/Agrandir-Regular.otf") format("opentype");
  font-weight: normal;
  font-style: normal;
}

body {
  margin: 0;
  background: #134e4a;
  font-family: Arial, sans-serif;
  color: white;

  display: flex;
  flex-direction: column;
  align-items: center;
}

/* TITULO */
h1 {
  margin-top: 40px;
  font-size: 24px;
  padding: 0 16px;
  text-align: center;
}

/* CONTENEDOR */
#tickets-container {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;
  padding-bottom: 35px;
}

/* WRAPPER */
.ticket-wrapper {
  position: relative;
  width: 85%;
  max-width: 380px;
  margin: 0 auto;
}

/* BACKGROUND */
.ticket-bg {
  width: 100%;
  border-radius: 20px;
  display: block;
}

/* QR */
.qr {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  bottom: 66px;
  width: 200px;
}

/* CÓDIGO */
.code {
  position: absolute;
  bottom: 55px;
  width: 100%;
  text-align: center;
  font-size: 6px;
  color: black;
  letter-spacing: 1px;
}

/* NÚMERO DE BOLETO */
.ticket-number {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 11px;
  color: white;
  opacity: 0.85;
  font-family: "Agrandir", Arial, sans-serif;
}

/* BOTÓN */
a {
  display: inline-block;
  margin-top: 26px;
  margin-bottom: 35px;
  color: white;
  text-decoration: none;
  font-family: "Agrandir", Arial, sans-serif;
  font-size: 16px;
  opacity: 0.9;
}

/* MOBILE */
@media (max-width: 480px) {

  h1 {
    font-size: 18px;
    margin-top: 30px;
  }

  .ticket-wrapper {
    width: 78%;
    max-width: 320px;
  }

  .qr {
    width: 165px;
    bottom: 62px;
  }

  .code {
    font-size: 6px;
    bottom: 90px;
  }

  .ticket-number {
    font-size: 12px;
  }
}

</style>
</head>

<body>

<h1 id="title">Cargando...</h1>

<div id="tickets-container"></div>

<a href="/">Volver al inicio</a>

<script>

const urlParams = new URLSearchParams(window.location.search);
const orderId = urlParams.get("order");

const container = document.getElementById("tickets-container");
const title = document.getElementById("title");

/* SOLO PRIMER NOMBRE */
function getFirstName(fullName) {
  if (!fullName) return "INVITADO";
  return fullName.trim().split(" ")[0];
}

if (!orderId) {
  container.innerHTML = "<p>Orden no encontrada.</p>";
} else {

  fetch(`/confirmacion-data?order=${orderId}`)
    .then(r => r.json())
    .then(data => {

      const buyerName = getFirstName(data.buyer_name);
      title.innerText = `¡GRACIAS ${buyerName.toUpperCase()} POR TU COMPRA!`;

      if (!data.tickets || data.tickets.length === 0) {
        container.innerHTML = "<p>No hay tickets.</p>";
        return;
      }

      data.tickets.forEach((t, index) => {

        const ticketNumber = index + 1;

        const div = document.createElement("div");

        div.innerHTML = `
          <div class="ticket-wrapper">

            <img src="/assets/ticket-pool.png" class="ticket-bg"/>

            <img src="${t.qr}" class="qr"/>

            <div class="code">
              ${t.ticket_code || ""}
            </div>

            <div class="ticket-number">
              ${ticketNumber}
            </div>

          </div>
        `;

        container.appendChild(div);
      });

    })
    .catch(err => {
      console.error(err);
      container.innerHTML = "<p>Error cargando datos.</p>";
    });
}

</script>

</body>
</html>
