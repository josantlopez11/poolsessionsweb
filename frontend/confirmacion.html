<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmación | POOL SESSIONS</title>
</head>
<body>
<h1>✅ Compra confirmada</h1>
<p>Recibirás tus boletos por correo. Aquí puedes verlos también:</p>
<div id="tickets"></div>
<a href="index.html">Volver</a>

<script>
async function fetchTickets(){
  const params = new URLSearchParams(window.location.search);
  const session_id = params.get("session_id");
  if(!session_id) return;

  try{
    const res = await fetch(`${window.location.origin.replace(/:[0-9]+/,'')}:3000/success?session_id=${session_id}`);
    const data = await res.json();
    const container = document.getElementById("tickets");
    data.tickets.forEach(t=>{
      const div = document.createElement("div");
      div.innerHTML = `<h3>${t.name}</h3><img src="${t.qr}" width="200"/>`;
      container.appendChild(div);
    });
  } catch(err){
    console.error(err);
  }
}
fetchTickets();
</script>
</body>
</html>
